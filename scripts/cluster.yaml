# Kubernetes Cluster Configuration for Federated Lingua Franca
# Make sure SSH key-based authentication is configured for all remote hosts.

# Private Docker Registry Configuration
registry:
  host: "workstation"      # Hostname or alias of the machine running the registry
  ip: "100.126.33.104"     # IP address of the registry machine
  port: 5000               # Port number on which the registry container will listen

# Kubernetes Control Plane Configuration (k3s Server)
controlPlane:
  host: "workstation"      # Hostname or alias of the control plane machine
  ip: "100.126.33.104"     # IP address of the control plane machine
  user: "dongha"           # SSH username for the control plane machine

# Kubernetes Worker Nodes Configuration (k3s Agents running federates or RTI)
workers:
  - host: "pi41"           # SSH hostname or alias of the first worker node
    ip: "100.81.195.53"   # IP address of the first worker node
    user: "pi41"           # SSH username for the first worker node
    lfHost: "100.81.195.53" # Target host identifier matching `.lf` "at" clauses (must be IP address for Pod nodeSelector matching)
  - host: "pi42"           # SSH hostname or alias of the first worker node
    ip: "100.96.177.102"   # IP address of the first worker node
    user: "pi42"           # SSH username for the first worker node
    lfHost: "100.96.177.102" # Target host identifier matching `.lf` "at" clauses (must be IP address for Pod nodeSelector matching)
  - host: "pi43"           # SSH hostname of the second worker node
    ip: "100.121.192.68"   # IP address of the second worker node
    user: "pi43"           # SSH username for the second worker node
    lfHost: "100.121.192.68" # Target host identifier matching `.lf` "at" clauses (must be IP address for Pod nodeSelector matching)


